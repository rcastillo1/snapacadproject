<!doctype html>
<html>
  <head>
    <title>Car Collection</title>
    <meta name="description" content="A Catalog of Shows Set in Los Angeles" />
    <link rel="stylesheet" href="style.css" />
    <script type="text/javascript" src="scripts.js"></script>
  </head>

  <body>
    <header class="main-header">

      <div class="dropdown">
        <button class="dropbtn">Menu ▾</button>
        <div class="dropdown-content">
        </div>
      </div>
      <div>
          <button onclick="sortAZ()"> Sort A-Z</button>
      </div>

      <div>
        <button>Sort Z-A </button>
      </div>

      <div>
        <button>Remove</button>
      </div>

      <h1 class="title">Car Collection</h1>
    </header>
    <div id="card-container"></div>
    <div class="card" style="display: none">
      <div class="card-content">
        <h2>TV Show Title</h2>
        <img src="" alt="TV Show Poster" />
        <ul>
          <li>Bullet Point 1</li>
          <li>Bullet Point 2</li>
          <li>Bullet Point 3</li>
        </ul>
      </div>
    </div>
    <div class="footer">
      <button onclick="quoteAlert()">Get A Quote!</button>
      <button onclick="removeLastCard()">Remove A Card!</button>
    </div>
  </body>
</html>
